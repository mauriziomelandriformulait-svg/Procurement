<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Link ERP Interno</title>
    <style>
        .btn-erp {
            background-color: #1ab394;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-erp:hover {
            background-color: #18a689;
        }
    </style>
</head>
<body>

    <button type="button" class="btn-erp" onclick="inviaMessaggioNavigazione()">
        Apri Ordine Cliente #1
    </button>

    <script>
    function inviaMessaggioNavigazione() {
        const percorsoTarget = "/home/workArea/salesOrder/1";
        
        // Strutturiamo il payload in diversi formati standard usati dagli ERP sul mercato
        // per massimizzare la possibilità che l'ascoltatore dell'ERP riconosca il comando.
        const payloadOggetto = {
            type: 'ROUTER_NAVIGATION',
            action: 'navigate',
            url: percorsoTarget,
            route: percorsoTarget,
            path: percorsoTarget,
            target: '_parent'
        };

        console.log("Invio comando di navigazione tramite postMessage sichero...");

        try {
            // 1. Invia come oggetto nativo (Standard HTML5)
            window.parent.postMessage(payloadOggetto, '*');
            
            // 2. Invia come stringa JSON (Molti vecchi ricevitori o customizzazioni leggono solo stringhe)
            window.parent.postMessage(JSON.stringify(payloadOggetto), '*');
            
            console.log("Messaggi inviati al parent. Controlla se l'ERP reagisce.");
        } catch (e) {
            console.error("Errore durante l'invio del postMessage (anomalo):", e);
        }
    }
    </script>

</body>
</html>
