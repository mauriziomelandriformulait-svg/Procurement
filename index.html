<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Link ERP Interno</title>
    <style>
        .btn-erp {
            background-color: #1ab394;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-erp:hover {
            background-color: #18a689;
        }
    </style>
</head>
<body>

    <button type="button" class="btn-erp" onclick="navigaStessoDominio()">
        Apri Ordine Cliente #1
    </button>

    <script>
    function navigaStessoDominio() {
        try {
            // Funziona istantaneamente SOLO se la pagina è ospitata sul server dell'ERP
            window.parent.location.hash = "#/home/workArea/salesOrder/1";
            console.log("Navigazione forzata con successo.");
        } catch (e) {
            console.error("Errore. Se vedi ancora SecurityError, significa che la pagina non è sullo stesso server dell'ERP:", e);
        }
    }
    </script>

</body>
</html>
