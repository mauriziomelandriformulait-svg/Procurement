<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procurement Process Flow</title>
    <style>
        .page-wrapper { width: 100%; max-width: 1200px; margin: 0 auto; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f3f4; color: #676a6c; margin: 0; padding: 40px 20px; }

        .procurement-banner-unified { background-color: #FED100; width: 100%; padding: 12px 20px; border-radius: 6px 6px 0 0; box-sizing: border-box; display: flex; align-items: center; }
        .procurement-banner-unified h2 { color: #000000; font-size: 21.6px; text-transform: uppercase; letter-spacing: 1px; margin: 0; }

        .horizontal-flow { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            width: 100%; 
            margin-bottom: 20px; 
            padding: 20px; 
            background: #ffffff; 
            border-radius: 0 0 8px 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            box-sizing: border-box; 
            gap: 10px; 
        }
        
        .procurement-group, .ordine-group { display: flex; align-items: center; gap: 10px; }
        .flow-card { flex: 1; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; padding: 15px 10px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: space-between; min-height: 160px; box-sizing: border-box; }
        
        .card-icon { font-size: 28px; margin-bottom: 5px; }
        .card-title { font-size: 13px; font-weight: 700; color: #2f4050; margin: 5px 0; }
        .flow-arrow { font-size: 20px; color: #cbd5e1; }
        
        .btn-erp { 
            background-color: #1ab394; 
            color: white; 
            border: none; 
            padding: 6px 10px; 
            font-size: 10px; 
            font-weight: bold; 
            border-radius: 4px; 
            text-decoration: none; 
            display: block; 
            width: 100%; 
            box-sizing: border-box;
            text-align: center;
        }
        
        .badge-info { font-size: 10px; background-color: #e2e8f0; color: #4a5568; padding: 4px 8px; border-radius: 4px; font-weight: 600; margin-top: auto; cursor: pointer; }

        .bottom-container { width: 100%; display: flex; gap: 20px; align-items: stretch; }
        .overview-box { flex: 1; background: #ffffff; border-radius: 8px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex; align-items: center; justify-content: center; }
        .btn-powerbi { background-color: #f2c811; color: #2f4050; padding: 15px 25px; font-size: 16px; font-weight: bold; border-radius: 8px; text-decoration: none; display: flex; align-items: center; gap: 10px; }
        
        .chart-box { flex: 2; background: #ffffff; border-radius: 8px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .dashboard-widgets { display: flex; justify-content: space-between; gap: 15px; }
        .widget-item { flex: 1; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .widget-title { font-size: 11px; font-weight: bold; text-transform: uppercase; color: #718096; margin-bottom: 10px; text-align: center; }
        
        .mini-bar-chart { display: flex; justify-content: space-around; align-items: flex-end; width: 100%; height: 70px; gap: 2px; }
        .m-bar { width: 100%; border-radius: 2px 2px 0 0; }
        .bg-anticipo { background-color: #1c84c6; } .bg-tempi { background-color: #1ab394; } .bg-ritardo { background-color: #ed5565; }
        
        .gauge-container { position: relative; width: 80px; height: 40px; overflow: hidden; margin-top: 5px; }
        .gauge-body { width: 80px; height: 80px; border-radius: 50%; border: 12px solid #e2e8f0; border-bottom-color: #FF0000; border-left-color: #1ab394; border-top-color: #f8ac59; position: absolute; box-sizing: border-box; }
        .gauge-needle { width: 4px; height: 35px; background: #2f4050; position: absolute; bottom: 0; left: 38px; transform-origin: bottom center; transform: rotate(45deg); border-radius: 2px; }
        .gauge-label { font-size: 14px; font-weight: 800; color: #ed5565; margin-top: 2px; }
    </style>
</head>
<body>

<div class="page-wrapper">
    <div class="procurement-banner-unified"><h2>Procurement</h2></div>
    
    <div class="horizontal-flow">
        <div class="procurement-group">
            <div class="flow-card">
                <div class="card-icon">📝</div>
                <h3 class="card-title">1. Emissione RdA</h3>
                <a href="https://diapdemo.formula.it:8282/due/#/home/workArea/purchaseRequestsAppl/1" class="btn-erp">Crea RDA</a>
            </div>
            <div class="flow-arrow">➡️</div>
            <div class="flow-card">
                <div class="card-icon">✅</div>
                <h3 class="card-title">2. Approva RDA</h3>
                <a href="https://diapdemo.formula.it:8282/due/#/home/desktop/MT%20-%20TODOLIST" class="btn-erp">Approva</a>
            </div>
        </div>
        
        <div class="flow-arrow">➡️</div>
        
        <div class="flow-card">
            <div class="card-icon">🛒</div>
            <h3 class="card-title">3. RdA > OdA</h3>
            <a href="https://diapdemo.formula.it:8282/due/#/home/desktop/CP-Ufficio%20Acquisti" class="btn-erp">Converti</a>
        </div>
        
        <div class="flow-arrow">➡️</div>
        
        <div class="ordine-group">
            <div class="flow-card">
                <div class="card-icon">⚙️</div>
                <h3 class="card-title">4. Gestione OdA</h3>
                <a href="https://diapdemo.formula.it:8282/due/#/home/workArea/purchaseOrders/1" class="btn-erp">Gestisci</a>
            </div>
            <div class="flow-arrow">➡️</div>
            <div class="flow-card">
                <div class="card-icon">👔</div>
                <h3 class="card-title">5. Autorizzazione</h3>
                <span class="badge-info" onclick="mostraAvviso()">Workflow</span>
            </div>
            <div class="flow-arrow">➡️</div>
            <div class="flow-card">
                <div class="card-icon">🚀</div>
                <h3 class="card-title">6. Invio</h3>
                <a href="mailto:?subject=Ordine" class="btn-erp">Mail</a>
            </div>
        </div>
    </div>

    <div class="bottom-container">
        <div class="overview-box">
            <a href="#" class="btn-powerbi">📊 Overview Supplier</a>
        </div>
        <div class="chart-box">
            <div class="dashboard-widgets">
                <div class="widget-item">
                    <div class="widget-title">Acquisti</div>
                    <div class="mini-bar-chart">
                        <div class="m-bar bg-anticipo" style="height: 40%;"></div>
                        <div class="m-bar bg-tempi" style="height: 85%;"></div>
                        <div class="m-bar bg-ritardo" style="height: 55%;"></div>
                    </div>
                </div>
                <div class="widget-item">
                    <div class="widget-title">Ordini da Sollecitare</div>
                    <div class="gauge-container">
                        <div class="gauge-body"></div>
                        <div class="gauge-needle"></div>
                    </div>
                    <div class="gauge-label">27k</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function mostraAvviso() {
        alert("⚠️ Workflow documentale non attivo");
    }
</script>

</body>
</html>
